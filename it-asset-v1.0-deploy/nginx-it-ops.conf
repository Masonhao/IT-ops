# IT运维管理系统 - Nginx反向代理配置
# 将此文件复制到 /etc/nginx/sites-available/it-ops
# 然后创建软链接: ln -s /etc/nginx/sites-available/it-ops /etc/nginx/sites-enabled/

server {
    # 监听端口
    listen 80;
    listen [::]:80;
    
    # 服务器名称（修改为你的域名或IP）
    # server_name ops.yourhospital.com;
    server_name _;  # 临时使用，上线前请修改为实际域名
    
    # ============ 安全头配置 ============
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # 防止MIME类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS保护
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 引用来源策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy（根据实际需求调整）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self'" always;
    
    # ============ 基本配置 ============
    # 客户端请求体大小限制（10MB）
    client_max_body_size 10M;
    
    # 请求超时
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # ============ 日志配置 ============
    # 访问日志
    access_log /var/log/nginx/it-ops_access.log combined buffer=512k flush=1m;
    
    # 错误日志
    error_log /var/log/nginx/it-ops_error.log warn;
    
    # ============ 静态文件服务 ============
    location /static {
        alias /opt/it-ops/it-asset-v1.0-deploy/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        #  gzip压缩
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/css application/javascript application/json image/svg+xml;
    }
    
    # ============ 主应用反向代理 ============
    location / {
        # 代理到Gunicorn
        proxy_pass http://127.0.0.1:5003;
        
        # 传递原始请求信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;  # 长时间操作（如报表导出）需要更长超时
        
        # 缓冲区设置
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # ============ 健康检查端点 ============
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # ============ 禁止访问的敏感文件 ============
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /(venv|__pycache__|\.git|\.env|*.pyc|*.pyo|*.log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}


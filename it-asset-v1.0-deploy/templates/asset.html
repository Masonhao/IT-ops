{% extends "base.html" %}
{% block title %}资产台账 - IT资产管理系统{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-pc-display"></i> 资产台账</h4>

<!-- 筛选栏 -->
<div class="card p-3 mb-3">
    <div class="row g-2 filter-bar">
        <div class="col-auto">
            <input type="text" class="form-control" id="searchKeyword" placeholder="搜索编号/名称/序列号/责任人">
        </div>
        <div class="col-auto">
            <select class="form-select" id="filterCategory">
                <option value="">全部分类</option>
            </select>
        </div>
        <div class="col-auto">
            <select class="form-select" id="filterStatus">
                <option value="">全部状态</option>
                <option value="in_stock">库存</option>
                <option value="in_use">在用</option>
                <option value="repair">维修</option>
                <option value="scrapped">报废</option>
                <option value="disposed">已处置</option>
            </select>
        </div>
        <div class="col-auto">
            <input type="text" class="form-control" id="filterDept" placeholder="部门">
        </div>
        <div class="col-auto">
            <button class="btn btn-primary" onclick="loadAssets()"><i class="bi bi-search"></i> 查询</button>
        </div>
        <div class="col-auto">
            <button class="btn btn-success" onclick="openAddModal()"><i class="bi bi-plus-lg"></i> 新增资产</button>
        </div>
    </div>
</div>

<!-- 资产列表 -->
<div class="card p-3">
    <table class="table table-hover table-sm">
        <thead>
            <tr>
                <th>资产编号</th><th>名称</th><th>分类</th><th>品牌/型号</th>
                <th>状态</th><th>部门</th><th>责任人</th><th>位置</th>
                <th>采购价格</th><th>操作</th>
            </tr>
        </thead>
        <tbody id="assetTable"></tbody>
    </table>
    <nav><ul class="pagination pagination-sm justify-content-center" id="pagination"></ul></nav>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal fade" id="assetModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="assetModalTitle">新增资产</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">资产名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="fName" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">资产分类 <span class="text-danger">*</span></label>
                        <select class="form-select" id="fCategory" required></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">资产编号</label>
                        <input type="text" class="form-control" id="fAssetNo" placeholder="留空自动生成">
                    </div>
                    <div class="col-md-3"><label class="form-label">品牌</label><input type="text" class="form-control" id="fBrand"></div>
                    <div class="col-md-3"><label class="form-label">型号</label><input type="text" class="form-control" id="fModel"></div>
                    <div class="col-md-3"><label class="form-label">序列号</label><input type="text" class="form-control" id="fSerialNo"></div>
                    <div class="col-md-3">
                        <label class="form-label">状态</label>
                        <select class="form-select" id="fStatus">
                            <option value="in_stock">库存</option><option value="in_use">在用</option>
                            <option value="repair">维修</option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">部门</label><input type="text" class="form-control" id="fDepartment"></div>
                    <div class="col-md-3"><label class="form-label">责任人</label><input type="text" class="form-control" id="fCustodian"></div>
                    <div class="col-md-3"><label class="form-label">位置</label><input type="text" class="form-control" id="fLocation"></div>
                    <div class="col-md-3"><label class="form-label">采购日期</label><input type="date" class="form-control" id="fPurchaseDate"></div>
                    <div class="col-md-3"><label class="form-label">采购价格</label><input type="number" step="0.01" class="form-control" id="fPurchasePrice"></div>
                    <div class="col-md-3"><label class="form-label">保修到期</label><input type="date" class="form-control" id="fWarrantyExpire"></div>
                    <div class="col-md-3">
                        <label class="form-label">供应商</label>
                        <select class="form-select" id="fSupplier"><option value="">请选择</option></select>
                    </div>
                    <div class="col-md-3"><label class="form-label">使用年限(月)</label><input type="number" class="form-control" id="fUsefulLife" value="60"></div>
                    <div class="col-md-3"><label class="form-label">残值率(%)</label><input type="number" step="0.1" class="form-control" id="fResidualRate" value="5"></div>
                    <div class="col-12"><label class="form-label">备注</label><textarea class="form-control" id="fRemark" rows="2"></textarea></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveAsset()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 资产详情模态框 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">资产详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body" id="detailContent"></div>
        </div>
    </div>
</div>

<!-- 操作模态框 -->
<div class="modal fade" id="actionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="actionModalTitle">资产操作</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="actionAssetId">
                <input type="hidden" id="actionType">
                <div class="mb-2"><label class="form-label">操作人</label><input type="text" class="form-control" id="actionOperator"></div>
                <div class="mb-2" id="actionToDept"><label class="form-label">目标部门</label><input type="text" class="form-control" id="actionToDeptVal"></div>
                <div class="mb-2" id="actionToLoc"><label class="form-label">目标位置</label><input type="text" class="form-control" id="actionToLocVal"></div>
                <div class="mb-2" id="actionToPerson"><label class="form-label">目标责任人</label><input type="text" class="form-control" id="actionToPersonVal"></div>
                <div class="mb-2"><label class="form-label">备注</label><textarea class="form-control" id="actionRemark" rows="2"></textarea></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="doAction()">确认</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
let categories = [];
let suppliers = [];

$(function() {
    loadCategories();
    loadSuppliers();
    loadAssets();
});

function loadCategories() {
    $.get('/api/categories', function(data) {
        categories = data;
        let opts = '<option value="">全部分类</option>';
        let formOpts = '';
        data.forEach(c => {
            const prefix = c.parent_id ? '　' : '';
            opts += `<option value="${c.id}">${prefix}${c.name}</option>`;
            formOpts += `<option value="${c.id}">${prefix}${c.name}</option>`;
        });
        $('#filterCategory').html(opts);
        $('#fCategory').html(formOpts);
    });
}

function loadSuppliers() {
    $.get('/api/suppliers', function(data) {
        suppliers = data;
        let opts = '<option value="">请选择</option>';
        data.forEach(s => opts += `<option value="${s.id}">${s.name}</option>`);
        $('#fSupplier').html(opts);
    });
}

function loadAssets(page = 1) {
    currentPage = page;
    const params = {
        page, per_page: 20,
        keyword: $('#searchKeyword').val(),
        category_id: $('#filterCategory').val(),
        status: $('#filterStatus').val(),
        department: $('#filterDept').val()
    };
    $.get('/api/assets', params, function(data) {
        let html = '';
        data.data.forEach(a => {
            html += `<tr>
                <td><a href="javascript:showDetail(${a.id})">${a.asset_no}</a></td>
                <td>${a.name}</td><td>${a.category_name||'-'}</td>
                <td>${[a.brand,a.model].filter(Boolean).join(' / ')||'-'}</td>
                <td>${STATUS_MAP[a.status]||a.status}</td>
                <td>${a.department||'-'}</td><td>${a.custodian||'-'}</td>
                <td>${a.location||'-'}</td>
                <td>${formatCurrency(a.purchase_price)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary action-btn" onclick="showDetail(${a.id})"><i class="bi bi-eye"></i></button>
                    <button class="btn btn-sm btn-outline-warning action-btn" onclick="openEditModal(${a.id})"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-success action-btn" onclick="openAction(${a.id},'transfer')"><i class="bi bi-arrow-left-right"></i></button>
                    <button class="btn btn-sm btn-outline-info action-btn" onclick="openAction(${a.id},'repair')"><i class="bi bi-wrench"></i></button>
                    <button class="btn btn-sm btn-outline-danger action-btn" onclick="confirmDelete(${a.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`;
        });
        $('#assetTable').html(html || '<tr><td colspan="10" class="text-center text-muted">暂无数据</td></tr>');

        // 分页
        const totalPage = Math.ceil(data.total / data.per_page);
        let pg = '';
        for (let i = 1; i <= totalPage && i <= 10; i++) {
            pg += `<li class="page-item ${i===page?'active':''}"><a class="page-link" href="javascript:loadAssets(${i})">${i}</a></li>`;
        }
        $('#pagination').html(pg);
    });
}

function openAddModal() {
    $('#editId').val('');
    $('#assetModalTitle').text('新增资产');
    $('#assetModal input, #assetModal textarea').val('');
    $('#fUsefulLife').val(60); $('#fResidualRate').val(5); $('#fStatus').val('in_stock');
    new bootstrap.Modal($('#assetModal')).show();
}

function openEditModal(id) {
    $.get(`/api/assets/${id}`, function(data) {
        $('#editId').val(data.id);
        $('#assetModalTitle').text('编辑资产');
        $('#fAssetNo').val(data.asset_no); $('#fName').val(data.name);
        $('#fCategory').val(data.category_id); $('#fBrand').val(data.brand||'');
        $('#fModel').val(data.model||''); $('#fSerialNo').val(data.serial_no||'');
        $('#fStatus').val(data.status); $('#fDepartment').val(data.department||'');
        $('#fCustodian').val(data.custodian||''); $('#fLocation').val(data.location||'');
        $('#fPurchaseDate').val(data.purchase_date||''); $('#fPurchasePrice').val(data.purchase_price||'');
        $('#fWarrantyExpire').val(data.warranty_expire||''); $('#fSupplier').val(data.supplier_id||'');
        $('#fUsefulLife').val(data.useful_life||60); $('#fResidualRate').val(data.residual_rate||5);
        $('#fRemark').val(data.remark||'');
        new bootstrap.Modal($('#assetModal')).show();
    });
}

function saveAsset() {
    const id = $('#editId').val();
    const data = {
        asset_no: $('#fAssetNo').val() || null,
        name: $('#fName').val(),
        category_id: parseInt($('#fCategory').val()),
        brand: $('#fBrand').val(), model: $('#fModel').val(),
        serial_no: $('#fSerialNo').val(), status: $('#fStatus').val(),
        department: $('#fDepartment').val(), custodian: $('#fCustodian').val(),
        location: $('#fLocation').val(), purchase_date: $('#fPurchaseDate').val() || null,
        purchase_price: $('#fPurchasePrice').val() || null,
        warranty_expire: $('#fWarrantyExpire').val() || null,
        supplier_id: $('#fSupplier').val() || null,
        useful_life: parseInt($('#fUsefulLife').val()) || 60,
        residual_rate: parseFloat($('#fResidualRate').val()) || 5,
        remark: $('#fRemark').val(), operator: '系统'
    };

    if (!data.name || !data.category_id) {
        showToast('请填写资产名称和分类', 'danger'); return;
    }

    const method = id ? 'PUT' : 'POST';
    const url = id ? `/api/assets/${id}` : '/api/assets';
    $.ajax({ url, method, contentType: 'application/json', data: JSON.stringify(data),
        success: function() {
            showToast(id ? '更新成功' : '新增成功');
            bootstrap.Modal.getInstance($('#assetModal')).hide();
            loadAssets(currentPage);
        },
        error: function(xhr) { showToast(xhr.responseJSON?.error || '操作失败', 'danger'); }
    });
}

function showDetail(id) {
    $.get(`/api/assets/${id}`, function(data) {
        let recordsHtml = '';
        (data.records || []).forEach(r => {
            recordsHtml += `<tr>
                <td>${ACTION_MAP[r.action]||r.action}</td>
                <td>${r.from_department||'-'} → ${r.to_department||'-'}</td>
                <td>${r.from_custodian||'-'} → ${r.to_custodian||'-'}</td>
                <td>${r.operator||'-'}</td>
                <td>${r.action_date||'-'}</td>
                <td>${r.remark||'-'}</td>
            </tr>`;
        });

        const html = `
        <div class="row">
            <div class="col-md-6">
                <table class="table table-sm">
                    <tr><th width="100">资产编号</th><td>${data.asset_no}</td></tr>
                    <tr><th>名称</th><td>${data.name}</td></tr>
                    <tr><th>分类</th><td>${data.category_name||'-'}</td></tr>
                    <tr><th>品牌/型号</th><td>${[data.brand,data.model].filter(Boolean).join(' / ')||'-'}</td></tr>
                    <tr><th>序列号</th><td>${data.serial_no||'-'}</td></tr>
                    <tr><th>状态</th><td>${STATUS_MAP[data.status]||data.status}</td></tr>
                </table>
            </div>
            <div class="col-md-6">
                <table class="table table-sm">
                    <tr><th width="100">部门</th><td>${data.department||'-'}</td></tr>
                    <tr><th>责任人</th><td>${data.custodian||'-'}</td></tr>
                    <tr><th>位置</th><td>${data.location||'-'}</td></tr>
                    <tr><th>采购日期</th><td>${formatDate(data.purchase_date)}</td></tr>
                    <tr><th>采购价格</th><td>${formatCurrency(data.purchase_price)}</td></tr>
                    <tr><th>保修到期</th><td>${formatDate(data.warranty_expire)}</td></tr>
                </table>
            </div>
        </div>
        ${data.remark ? `<p class="text-muted"><strong>备注：</strong>${data.remark}</p>` : ''}
        <h6 class="mt-3">操作记录</h6>
        <table class="table table-sm table-bordered">
            <thead><tr><th>操作</th><th>部门变更</th><th>责任人变更</th><th>操作人</th><th>时间</th><th>备注</th></tr></thead>
            <tbody>${recordsHtml || '<tr><td colspan="6" class="text-center text-muted">暂无记录</td></tr>'}</tbody>
        </table>`;
        $('#detailContent').html(html);
        new bootstrap.Modal($('#detailModal')).show();
    });
}

function openAction(id, action) {
    $('#actionAssetId').val(id);
    $('#actionType').val(action);
    const titles = { transfer: '资产调拨', repair: '资产维修', allocate: '资产分配', return: '资产归还', scrap: '资产报废' };
    $('#actionModalTitle').text(titles[action] || '资产操作');

    const showFields = action === 'transfer' || action === 'allocate';
    $('#actionToDept, #actionToLoc, #actionToPerson').toggle(showFields);
    if (!showFields) { $('#actionToDeptVal, #actionToLocVal, #actionToPersonVal').val(''); }

    new bootstrap.Modal($('#actionModal')).show();
}

function doAction() {
    const id = $('#actionAssetId').val();
    const action = $('#actionType').val();
    const data = {
        action,
        operator: $('#actionOperator').val() || '系统',
        to_department: $('#actionToDeptVal').val() || null,
        to_location: $('#actionToLocVal').val() || null,
        to_custodian: $('#actionToPersonVal').val() || null,
        remark: $('#actionRemark').val()
    };
    $.ajax({ url: `/api/assets/${id}/action`, method: 'POST', contentType: 'application/json',
        data: JSON.stringify(data),
        success: function() { showToast('操作成功'); bootstrap.Modal.getInstance($('#actionModal')).hide(); loadAssets(currentPage); },
        error: function(xhr) { showToast(xhr.responseJSON?.error || '操作失败', 'danger'); }
    });
}

function confirmDelete(id) {
    if (!confirm('确定要删除此资产吗？删除后不可恢复！')) return;
    $.ajax({ url: `/api/assets/${id}`, method: 'DELETE',
        success: function() { showToast('删除成功'); loadAssets(currentPage); },
        error: function(xhr) { showToast(xhr.responseJSON?.error || '删除失败', 'danger'); }
    });
}
</script>
{% endblock %}

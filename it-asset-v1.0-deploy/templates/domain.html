{% extends "base.html" %}
{% block title %}域名管理 - IT资产管理系统{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-globe2"></i> 域名管理</h4>

<!-- 统计卡片 -->
<div class="row mb-4" id="statCards"></div>

<!-- 操作栏 -->
<div class="card p-3 mb-3">
    <div class="row g-2">
        <div class="col-auto">
            <input type="text" class="form-control" id="searchKeyword" placeholder="搜索域名/服务商/负责人">
        </div>
        <div class="col-auto">
            <select class="form-select" id="filterStatus">
                <option value="">全部状态</option>
                <option value="active">正常</option>
                <option value="urgent">紧急（即将到期）</option>
                <option value="expired">已过期</option>
                <option value="renewing">续费中</option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-primary" onclick="loadDomains()"><i class="bi bi-search"></i> 查询</button>
        </div>
        <div class="col-auto">
            <button class="btn btn-success" onclick="openAddModal()"><i class="bi bi-plus-lg"></i> 新增域名</button>
        </div>
    </div>
</div>

<!-- 域名列表 -->
<div class="card p-3">
    <table class="table table-hover table-sm">
        <thead>
            <tr>
                <th>域名</th><th>服务商</th><th>开始时间</th><th>到期时间</th>
                <th>剩余时间</th><th>状态</th><th>自动续费</th><th>负责人</th><th>操作</th>
            </tr>
        </thead>
        <tbody id="domainTable"></tbody>
    </table>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal fade" id="domainModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增域名</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">域名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="fDomainName" placeholder="如：example.com">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">服务商 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="fRegistrar" placeholder="如：阿里云">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">开始时间 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="fStartDate">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">到期时间 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="fExpireDate">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">年费(元)</label>
                        <input type="number" step="0.01" class="form-control" id="fPurchasePrice" placeholder="续费价格">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">DNS服务器</label>
                        <input type="text" class="form-control" id="fDnsServer" placeholder="如：dns1.aliyun.com">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">自动续费</label>
                        <div class="form-check form-switch mt-1">
                            <input class="form-check-input" type="checkbox" id="fAutoRenew">
                            <label class="form-check-label" for="fAutoRenew" id="autoRenewLabel">关闭</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">负责人</label>
                        <input type="text" class="form-control" id="fCustodian">
                    </div>
                    <div class="col-12">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="fRemark" rows="2"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveDomain()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 续费模态框 -->
<div class="modal fade" id="renewModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-arrow-repeat text-success"></i> 域名续费</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="renewId">
                <div class="alert alert-info" id="renewInfo"></div>
                <div class="mb-3">
                    <label class="form-label">续费后新到期时间 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="fRenewExpireDate">
                    <div class="form-text">建议在原到期时间基础上续费1年</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" onclick="doRenew()"><i class="bi bi-check-lg"></i> 确认续费</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let allDomains = [];

$(function() { loadDomains(); });

// 自动续费开关文本
$('#fAutoRenew').on('change', function() {
    $('#autoRenewLabel').text(this.checked ? '开启' : '关闭');
});

function loadDomains() {
    $.get('/api/domains', function(data) {
        allDomains = data;
        renderStats(data);

        // 筛选
        const keyword = $('#searchKeyword').val().toLowerCase();
        const statusFilter = $('#filterStatus').val();
        let filtered = data;
        if (keyword) {
            filtered = filtered.filter(d =>
                (d.domain_name||'').toLowerCase().includes(keyword) ||
                (d.registrar||'').toLowerCase().includes(keyword) ||
                (d.custodian||'').toLowerCase().includes(keyword)
            );
        }
        if (statusFilter) {
            filtered = filtered.filter(d => d.status === statusFilter);
        }

        renderTable(filtered);
    });
}

function renderStats(data) {
    const total = data.length;
    const active = data.filter(d => d.status === 'active').length;
    const urgent = data.filter(d => d.status === 'urgent').length;
    const expired = data.filter(d => d.status === 'expired').length;

    $('#statCards').html(`
        <div class="col-md-3">
            <div class="card stat-card">
                <div class="stat-number text-primary">${total}</div>
                <div class="stat-label">域名总数</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <div class="stat-number text-success">${active}</div>
                <div class="stat-label">正常运行</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <div class="stat-number text-danger">${urgent}</div>
                <div class="stat-label">紧急（需续费）</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <div class="stat-number text-secondary">${expired}</div>
                <div class="stat-label">已过期</div>
            </div>
        </div>
    `);
}

function renderTable(data) {
    let html = '';
    data.forEach(d => {
        // 状态标签
        const statusMap = {
            active: '<span class="badge bg-success badge-status"><i class="bi bi-check-circle me-1"></i>正常</span>',
            urgent: '<span class="badge bg-danger badge-status"><i class="bi bi-exclamation-triangle me-1"></i>紧急</span>',
            expired: '<span class="badge bg-secondary badge-status"><i class="bi bi-x-circle me-1"></i>已过期</span>',
            renewing: '<span class="badge bg-info badge-status"><i class="bi bi-arrow-repeat me-1"></i>续费中</span>'
        };

        // 进度条
        let progressHtml = '';
        if (d.days_left !== null && d.days_left !== undefined) {
            const pct = d.progress_percent || 0;
            const daysLeft = d.days_left;

            let barClass = 'bg-success';
            let barLabel = '';
            if (daysLeft <= 0) {
                barClass = 'bg-secondary';
                barLabel = '已过期';
            } else if (daysLeft <= 30) {
                barClass = 'bg-danger';
                barLabel = `${daysLeft}天`;
            } else if (daysLeft <= 90) {
                barClass = 'bg-warning';
                barLabel = `${daysLeft}天`;
            } else {
                barLabel = `${daysLeft}天`;
            }

            // 进度条颜色：剩余少→红色多，剩余多→绿色多
            // 已使用比例越高（越接近到期），颜色越红
            progressHtml = `
                <div class="d-flex align-items-center">
                    <div class="progress flex-grow-1 me-2" style="height:20px; min-width:120px;">
                        <div class="progress-bar ${barClass}" role="progressbar"
                             style="width: ${Math.min(pct, 100)}%"
                             aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
                        </div>
                    </div>
                    <span class="fw-bold ${daysLeft <= 30 ? 'text-danger' : daysLeft <= 90 ? 'text-warning' : 'text-success'}" style="min-width:60px; white-space:nowrap;">
                        ${barLabel}
                    </span>
                </div>
            `;
        }

        // 自动续费
        const autoRenewHtml = d.auto_renew ?
            '<span class="badge bg-info"><i class="bi bi-check"></i> 已开启</span>' :
            '<span class="text-muted">-</span>';

        html += `<tr class="${d.status === 'urgent' ? 'table-danger' : d.status === 'expired' ? 'table-secondary' : ''}">
            <td><strong>${d.domain_name}</strong></td>
            <td>${d.registrar||'-'}</td>
            <td>${formatDate(d.start_date)}</td>
            <td>${formatDate(d.expire_date)}</td>
            <td>${progressHtml}</td>
            <td>${statusMap[d.status]||d.status}</td>
            <td>${autoRenewHtml}</td>
            <td>${d.custodian||'-'}</td>
            <td>
                <button class="btn btn-sm btn-outline-success action-btn" onclick="openRenewModal(${d.id})" title="续费"><i class="bi bi-arrow-repeat"></i></button>
                <button class="btn btn-sm btn-outline-warning action-btn" onclick="openEditModal(${d.id})" title="编辑"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger action-btn" onclick="deleteDomain(${d.id})" title="删除"><i class="bi bi-trash"></i></button>
            </td>
        </tr>`;
    });

    $('#domainTable').html(html || '<tr><td colspan="9" class="text-center text-muted">暂无域名数据</td></tr>');
}

function openAddModal() {
    $('#editId').val('');
    $('#modalTitle').text('新增域名');
    $('#domainModal input[type="text"], #domainModal input[type="number"], #domainModal input[type="date"], #domainModal textarea').val('');
    $('#fAutoRenew').prop('checked', false);
    $('#autoRenewLabel').text('关闭');
    new bootstrap.Modal($('#domainModal')).show();
}

function openEditModal(id) {
    const d = allDomains.find(i => i.id === id);
    if (!d) return;
    $('#editId').val(d.id);
    $('#modalTitle').text('编辑域名');
    $('#fDomainName').val(d.domain_name);
    $('#fRegistrar').val(d.registrar);
    $('#fStartDate').val(d.start_date);
    $('#fExpireDate').val(d.expire_date);
    $('#fPurchasePrice').val(d.purchase_price||'');
    $('#fDnsServer').val(d.dns_server||'');
    $('#fAutoRenew').prop('checked', !!d.auto_renew);
    $('#autoRenewLabel').text(d.auto_renew ? '开启' : '关闭');
    $('#fCustodian').val(d.custodian||'');
    $('#fRemark').val(d.remark||'');
    new bootstrap.Modal($('#domainModal')).show();
}

function saveDomain() {
    const id = $('#editId').val();
    const data = {
        domain_name: $('#fDomainName').val().trim(),
        registrar: $('#fRegistrar').val().trim(),
        start_date: $('#fStartDate').val(),
        expire_date: $('#fExpireDate').val(),
        purchase_price: $('#fPurchasePrice').val() || 0,
        dns_server: $('#fDnsServer').val().trim(),
        auto_renew: $('#fAutoRenew').is(':checked'),
        custodian: $('#fCustodian').val().trim(),
        remark: $('#fRemark').val().trim()
    };

    if (!data.domain_name) { showToast('请填写域名', 'danger'); return; }
    if (!data.registrar) { showToast('请填写服务商', 'danger'); return; }
    if (!data.start_date) { showToast('请选择开始时间', 'danger'); return; }
    if (!data.expire_date) { showToast('请选择到期时间', 'danger'); return; }

    const method = id ? 'PUT' : 'POST';
    const url = id ? `/api/domains/${id}` : '/api/domains';

    $.ajax({
        url, method, contentType: 'application/json', data: JSON.stringify(data),
        success: function() {
            showToast(id ? '更新成功' : '新增成功');
            bootstrap.Modal.getInstance($('#domainModal')).hide();
            loadDomains();
        },
        error: function(xhr) { showToast(xhr.responseJSON?.error || '操作失败', 'danger'); }
    });
}

function openRenewModal(id) {
    const d = allDomains.find(i => i.id === id);
    if (!d) return;
    $('#renewId').val(d.id);
    $('#renewInfo').html(`<strong>${d.domain_name}</strong> 当前到期时间：<strong>${formatDate(d.expire_date)}</strong>
        ${d.days_left !== null ? `（剩余 ${d.days_left} 天）` : ''}`);

    // 默认续费1年
    if (d.expire_date) {
        const expDate = new Date(d.expire_date);
        const newExp = new Date(expDate);
        newExp.setFullYear(newExp.getFullYear() + 1);
        // 如果已过期，从今天开始算
        if (d.days_left <= 0) {
            const today = new Date();
            newExp.setFullYear(today.getFullYear() + 1);
            newExp.setMonth(today.getMonth());
            newExp.setDate(today.getDate());
        }
        const yyyy = newExp.getFullYear();
        const mm = String(newExp.getMonth()+1).padStart(2,'0');
        const dd = String(newExp.getDate()).padStart(2,'0');
        $('#fRenewExpireDate').val(`${yyyy}-${mm}-${dd}`);
    }

    new bootstrap.Modal($('#renewModal')).show();
}

function doRenew() {
    const id = $('#renewId').val();
    const newExpire = $('#fRenewExpireDate').val();
    if (!newExpire) { showToast('请选择续费后的到期时间', 'danger'); return; }

    $.ajax({
        url: `/api/domains/${id}/renew`, method: 'POST',
        contentType: 'application/json', data: JSON.stringify({ expire_date: newExpire }),
        success: function(resp) {
            showToast(resp.message);
            bootstrap.Modal.getInstance($('#renewModal')).hide();
            loadDomains();
        },
        error: function(xhr) { showToast(xhr.responseJSON?.error || '续费失败', 'danger'); }
    });
}

function deleteDomain(id) {
    if (!confirm('确定删除此域名记录？')) return;
    $.ajax({
        url: `/api/domains/${id}`, method: 'DELETE',
        success: function() { showToast('删除成功'); loadDomains(); },
        error: function() { showToast('删除失败', 'danger'); }
    });
}
</script>
{% endblock %}

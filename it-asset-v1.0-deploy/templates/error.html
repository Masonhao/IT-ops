<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - 企业运维管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { text-align: center; padding: 40px; }
        .error-icon { font-size: 4rem; color: #dc3545; }
        .error-title { font-size: 1.5rem; font-weight: 700; margin: 20px 0 10px; }
        .error-msg { color: #6c757d; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">&#9888;</div>
        <div class="error-title">访问受限</div>
        <div class="error-msg">{{ message or '您没有权限访问此页面' }}</div>
        <a href="/" class="btn btn-primary">返回首页</a>
        <a href="/login" class="btn btn-outline-secondary ms-2">重新登录</a>
    </div>
</body>
</html>

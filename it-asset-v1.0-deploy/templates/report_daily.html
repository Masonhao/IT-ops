{% extends "base.html" %}
{% block title %}日报管理 - 企业运维管理系统{% endblock %}
{% block page_title %}日报管理{% endblock %}
{% block content %}
<div class="container-fluid px-3">
    <!-- 操作栏 -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="d-flex gap-2 align-items-center flex-wrap filter-bar">
            <input type="date" class="form-control form-control-sm" id="filterDateFrom" value="" onchange="loadData()">
            <span class="text-muted">至</span>
            <input type="date" class="form-control form-control-sm" id="filterDateTo" value="" onchange="loadData()">
        </div>
        <button class="btn btn-primary btn-sm" onclick="showAddModal()">
            <i class="bi bi-plus-lg"></i> 新增日报
        </button>
    </div>

    <!-- 日报列表 -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0" id="dataTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>标题</th>
                            <th>填写人</th>
                            <th>总耗时(分)</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 新增/编辑日报模态框 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增日报</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">日期</label>
                        <input type="date" class="form-control form-control-sm" id="editDate" value="">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">标题</label>
                        <input type="text" class="form-control form-control-sm" id="editTitle" placeholder="日报标题">
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">今日总结</label>
                        <textarea class="form-control form-control-sm" id="editSummary" rows="3" placeholder="今日工作概要..."></textarea>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">已完成工作</label>
                        <textarea class="form-control form-control-sm" id="editCompleted" rows="3" placeholder="逐项列出已完成的工作..."></textarea>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">待处理事项</label>
                        <textarea class="form-control form-control-sm" id="editPending" rows="2" placeholder="待跟进或未完成的事项..."></textarea>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">问题与风险</label>
                        <textarea class="form-control form-control-sm" id="editProblems" rows="2" placeholder="遇到的问题或潜在风险..."></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">关联设备ID</label>
                        <input type="text" class="form-control form-control-sm" id="editEquipIds" placeholder="多个用逗号分隔">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">关联工作日志ID</label>
                        <input type="text" class="form-control form-control-sm" id="editWorkLogIds" placeholder="多个用逗号分隔">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">总耗时(分钟)</label>
                        <input type="number" class="form-control form-control-sm" id="editDuration" value="0" min="0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" style="font-size:0.85rem;">状态</label>
                        <select class="form-select form-select-sm" id="editStatus">
                            <option value="draft">草稿</option>
                            <option value="submitted">已提交</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="saveData()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function loadData() {
    const params = new URLSearchParams({
        report_type: 'daily',
        date_from: $('#filterDateFrom').val(),
        date_to: $('#filterDateTo').val()
    });
    $.get('/api/reports/list?' + params.toString()).done(function(data) {
        renderTable(data);
    });
}

function renderTable(data) {
    const tbody = $('#tableBody').empty();
    if (!data || data.length === 0) {
        tbody.append('<tr><td colspan="6" class="text-center text-muted py-4">暂无日报</td></tr>');
        return;
    }
    data.forEach(function(item) {
        const statusBadge = item.status === 'submitted'
            ? '<span class="badge bg-success badge-status">已提交</span>'
            : '<span class="badge bg-secondary badge-status">草稿</span>';
        tbody.append(`
            <tr>
                <td>${item.report_date}</td>
                <td><a href="javascript:void(0)" onclick="viewReport(${item.id})" class="fw-bold text-decoration-none">${item.title}</a></td>
                <td>${item.user_name || '--'}</td>
                <td>${item.duration_total || 0}</td>
                <td>${statusBadge}</td>
                <td>
                    <button class="btn btn-outline-primary btn-sm action-btn" onclick="editData(${item.id})"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-outline-danger btn-sm action-btn" onclick="deleteData(${item.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `);
    });
}

function showAddModal() {
    $('#editId').val('');
    $('#editDate').val(new Date().toISOString().slice(0,10));
    $('#editTitle').val(new Date().toISOString().slice(0,10) + ' 工作日报');
    $('#editSummary').val('');
    $('#editCompleted').val('');
    $('#editPending').val('');
    $('#editProblems').val('');
    $('#editEquipIds').val('');
    $('#editWorkLogIds').val('');
    $('#editDuration').val('0');
    $('#editStatus').val('draft');
    $('#modalTitle').text('新增日报');
    new bootstrap.Modal($('#editModal')[0]).show();
}

function editData(id) {
    $.get('/api/reports/' + id).done(function(item) {
        $('#editId').val(item.id);
        $('#editDate').val(item.report_date);
        $('#editTitle').val(item.title);
        $('#editSummary').val(item.summary || '');
        $('#editCompleted').val(item.completed_tasks || '');
        $('#editPending').val(item.pending_tasks || '');
        $('#editProblems').val(item.problems || '');
        $('#editEquipIds').val(item.equipment_ids || '');
        $('#editWorkLogIds').val(item.work_log_ids || '');
        $('#editDuration').val(item.duration_total || 0);
        $('#editStatus').val(item.status);
        $('#modalTitle').text('编辑日报');
        new bootstrap.Modal($('#editModal')[0]).show();
    }).fail(function(xhr) { showToast(xhr.responseJSON?.error || '加载失败', 'danger'); });
}

function viewReport(id) {
    $.get('/api/reports/' + id).done(function(item) {
        let equipHtml = '';
        if (item.equipments && item.equipments.length) {
            equipHtml = '<h6>关联设备：</h6><ul>' + item.equipments.map(e => `<li>${e.equip_no} - ${e.name}</li>`).join('') + '</ul>';
        }
        let wlHtml = '';
        if (item.work_logs && item.work_logs.length) {
            wlHtml = '<h6>关联工作日志：</h6><ul>' + item.work_logs.map(w => `<li>${w.log_date} - ${w.title} (${w.duration_minutes}分钟)</li>`).join('') + '</ul>';
        }
        const html = `
            <div class="modal fade" id="viewModal" tabindex="-1">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header"><h5>${item.title}</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                        <div class="modal-body">
                            <div class="row g-2 mb-3">
                                <div class="col-md-6"><strong>日期：</strong>${item.report_date}</div>
                                <div class="col-md-6"><strong>填写人：</strong>${item.user_name}</div>
                                <div class="col-md-6"><strong>状态：</strong>${item.status === 'submitted' ? '已提交' : '草稿'}</div>
                                <div class="col-md-6"><strong>总耗时：</strong>${item.duration_total || 0} 分钟</div>
                            </div>
                            ${item.summary ? '<h6>今日总结：</h6><p style="white-space:pre-wrap;">' + item.summary + '</p>' : ''}
                            ${item.completed_tasks ? '<h6>已完成工作：</h6><p style="white-space:pre-wrap;">' + item.completed_tasks + '</p>' : ''}
                            ${item.pending_tasks ? '<h6>待处理事项：</h6><p style="white-space:pre-wrap;">' + item.pending_tasks + '</p>' : ''}
                            ${item.problems ? '<h6>问题与风险：</h6><p style="white-space:pre-wrap;">' + item.problems + '</p>' : ''}
                            ${equipHtml}
                            ${wlHtml}
                        </div>
                    </div>
                </div>
            </div>`;
        $('body').append(html);
        new bootstrap.Modal($('#viewModal')[0]).show();
        $('#viewModal').on('hidden.bs.modal', function() { $(this).remove(); });
    }).fail(function(xhr) { showToast(xhr.responseJSON?.error || '加载失败', 'danger'); });
}

function saveData() {
    const id = $('#editId').val();
    const data = {
        report_type: 'daily',
        report_date: $('#editDate').val(),
        title: $('#editTitle').val(),
        summary: $('#editSummary').val() || '',
        completed_tasks: $('#editCompleted').val() || '',
        pending_tasks: $('#editPending').val() || '',
        problems: $('#editProblems').val() || '',
        equipment_ids: $('#editEquipIds').val() || '',
        work_log_ids: $('#editWorkLogIds').val() || '',
        duration_total: parseInt($('#editDuration').val()) || 0,
        status: $('#editStatus').val()
    };
    if (!data.title) { showToast('请填写标题', 'warning'); return; }
    const req = id ? $.ajax({ url: '/api/reports/' + id, method: 'PUT', contentType: 'application/json', data: JSON.stringify(data) })
                   : $.ajax({ url: '/api/reports', method: 'POST', contentType: 'application/json', data: JSON.stringify(data) });
    req.done(function() {
        showToast(id ? '更新成功' : '新增成功');
        bootstrap.Modal.getInstance($('#editModal')[0]).hide();
        loadData();
    }).fail(function(xhr) { showToast(xhr.responseJSON?.error || '操作失败', 'danger'); });
}

function deleteData(id) {
    if (!confirm('确定删除此日报？')) return;
    $.ajax({ url: '/api/reports/' + id, method: 'DELETE' }).done(function() {
        showToast('删除成功'); loadData();
    }).fail(function(xhr) { showToast(xhr.responseJSON?.error || '删除失败', 'danger'); });
}

$(function() {
    const today = new Date().toISOString().slice(0,10);
    $('#filterDateFrom').val(today);
    $('#filterDateTo').val(today);
    loadData();
});
</script>
{% endblock %}
